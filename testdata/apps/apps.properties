# Test configuration for the apps service in the docker-compose test stack.
# Mounted at /etc/iplant/de/apps.properties (the apps.core --config default).
#
# Scope: DB-only. The apps service connects eagerly to the database at boot but
# reaches its other clients (metadata, permissions, iplant-groups, jex,
# data-info, notification-agent) only lazily, on first use. Those base URLs are
# left at their in-cluster defaults below and are unreachable in this stack, so
# endpoints that depend on them will error until those services are added. All
# database-backed endpoints work. See ../COVERAGE.md for the endpoint breakdown.
#
# All values are placeholders for local testing; nothing is sent to any real
# service.

# Application details.
apps.app.listen-port      = 60000
apps.app.environment-name = test

# Feature flags. Tapis is disabled so no HPC/Tapis backend is needed. The Tapis
# credentials below are still validated at boot even when disabled, so they are
# present as dummy placeholders and are never used.
apps.features.tapis      = false
apps.features.tapis.jobs = false

apps.tapis.key          = not_a_key
apps.tapis.secret       = not_a_secret
apps.tapis.redirect-uri = http://localhost/de/oauth/callback/tapis
apps.tapis.callback-base = http://localhost/de/tapis-cb

# Database settings (the de-database test image, service name "de-database").
apps.db.driver      = org.postgresql.Driver
apps.db.subprotocol = postgresql
apps.db.host        = de-database
apps.db.port        = 5432
apps.db.name        = de
apps.db.user        = de
apps.db.password    = de

# Required-at-boot settings (no default in the service; boot fails if absent).
# Use a request query param of ?user=testuserNN so the fully-qualified username
# becomes testuserNN@example.org, matching the seeded fixture users.
apps.uid.domain              = example.org
apps.ui.base-url             = http://localhost:3000
apps.email.app-deletion.from = noreply@example.org
apps.email.app-request.from  = noreply@example.org
apps.email.app-request.to    = admin@example.org

# Workspace / app-category settings. These MUST match the seeded fixtures so
# workspace bootstrap, the favorites flag, and Beta behavior line up.
apps.workspace.root-app-category            = Workspace
apps.workspace.default-app-categories       = ["Apps under development","Favorite Apps"]
apps.workspace.dev-app-category-index       = 0
apps.workspace.favorites-app-category-index = 1
apps.workspace.public-id                    = 00000000-0000-0000-0000-000000000000
apps.workspace.metadata.beta.attr.iri       = n2t.net/ark:/99152/h1459
apps.workspace.metadata.beta.attr.label     = releaseStatus
apps.workspace.metadata.beta.value          = beta

# External service base URLs. Left at in-cluster defaults; unreachable in this
# DB-only stack and contacted only lazily. Listed for discoverability — point
# these at real/stub services when those are added to the stack.
apps.metadata.base-url          = http://metadata:60000
apps.permissions.base-url       = http://permissions:60000
apps.iplant-groups.base-url     = http://iplant-groups:60000
apps.jex.base-url               = http://jex-events:60000
apps.data-info.base-url         = http://data-info:60000
apps.notificationagent.base-url = http://notification-agent:60000

# Test configuration for the metadata service in the docker-compose test stack.
# Mounted at /etc/iplant/de/metadata.properties (the metadata.core --config default).
#
# The metadata service references its tables unqualified and has no schema setting,
# so it connects as the dedicated `metadata` login role (created by
# testdata/sql/90_metadata_role.sql) whose search_path is `metadata, public`. That
# resolves the metadata-schema tables — including the ones whose names also exist
# in public (ratings, comments) — to the correct schema.
#
# All values are placeholders for local testing.

# Application details.
metadata.app.listen-port      = 60000
metadata.app.environment-name = test

# Database settings (de-database test image; db "de", metadata role/search_path).
metadata.db.subprotocol = postgresql
metadata.db.host        = de-database
metadata.db.port        = 5432
metadata.db.name        = de
metadata.db.user        = metadata
metadata.db.password    = metadata

# AMQP. The metadata service opens this connection at startup (fail-fast), so a
# broker must be reachable. RabbitMQ's default "guest" user is restricted to
# localhost, so the stack defines a "de" user instead.
metadata.amqp.uri                  = amqp://de:de@rabbitmq:5672
metadata.amqp.exchange.name        = de
metadata.amqp.exchange.type        = topic
metadata.amqp.exchange.durable     = true
metadata.amqp.exchange.auto-delete = false

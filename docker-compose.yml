# Spins up the standalone DE test database (schema migrated + synthetic data
# baked in). For functional/integration testing of DE services; not part of the
# production build/deploy path.
#
#   docker compose up -d            # build (first run) and start
#   docker compose up -d --build    # force a rebuild after changing testdata/
#   docker compose down -v          # stop and drop the volume
#
# The published host port defaults to 5432 but can be overridden if that port is
# already in use locally:  DE_DB_PORT=5440 docker compose up -d
#
# Connect: postgres://de:de@localhost:5432/de?sslmode=disable
#
# Other compose stacks can wait for a ready database with:
#   depends_on:
#     de-database:
#       condition: service_healthy

services:
  de-database:
    build:
      context: .
      dockerfile: Dockerfile.testdb
    image: de-database-testdb
    container_name: de-database-testdb
    ports:
      - "${DE_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: de
      POSTGRES_DB: de
      POSTGRES_PASSWORD: de
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "de", "-d", "de"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
